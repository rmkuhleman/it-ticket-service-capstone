<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - IT Ticket Service</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>Login</h1>

    <p>
        Enter your username and password to access your tickets.
        New users can create an account by entering a new username and password.
    </p>

    {% if error %}
    <p class="error-message">{{ error }}</p>
    {% endif %}

    <form method="POST" action="/login">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required maxlength="50">

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required maxlength="100">

        <button type="submit">Login / Create Account</button>
    </form>
</div>

</body>
</html>
